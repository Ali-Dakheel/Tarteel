services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: tarteel_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tarteel
      POSTGRES_USER: tarteel
      POSTGRES_PASSWORD: tarteel
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tarteel -d tarteel"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tarteel

  redis:
    image: redis:7-alpine
    container_name: tarteel_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tarteel

  ollama:
    image: ollama/ollama
    container_name: tarteel_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_FLASH_ATTENTION: "1"
      OLLAMA_NUM_PARALLEL: "2"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - tarteel

  laravel:
    build:
      context: ./laravel
      dockerfile: Dockerfile
    container_name: tarteel_laravel
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      APP_KEY: ${APP_KEY:-base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
      APP_ENV: local
      APP_DEBUG: "true"
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: tarteel
      DB_USERNAME: tarteel
      DB_PASSWORD: tarteel
      REDIS_HOST: redis
      REDIS_PORT: 6379
      BROADCAST_CONNECTION: reverb
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      FASTAPI_URL: http://fastapi:8001
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev-internal-key-change-in-production}
    volumes:
      - ./laravel:/var/www/html
      - laravel_vendor:/var/www/html/vendor
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - tarteel

  fastapi:
    build:
      context: ./fastapi
      dockerfile: Dockerfile
    container_name: tarteel_fastapi
    restart: unless-stopped
    # No ports: mapping — internal network only, not exposed to host
    environment:
      DATABASE_URL: postgresql://tarteel:tarteel@postgres:5432/tarteel
      REDIS_URL: redis://redis:6379/0
      OLLAMA_BASE_URL: http://ollama:11434
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev-internal-key-change-in-production}
    volumes:
      - ./fastapi:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    networks:
      - tarteel

  nextjs:
    build:
      context: ./nextjs
      dockerfile: Dockerfile
    container_name: tarteel_nextjs
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      LARAVEL_URL: http://laravel:8000
    depends_on:
      - laravel
    networks:
      - tarteel

volumes:
  postgres_data:
  redis_data:
  ollama_data:
  laravel_vendor:

networks:
  tarteel:
    driver: bridge
